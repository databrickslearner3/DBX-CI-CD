name: Production Notebook Deployment

on:
  push:
    branches:
      - main

# FIX: This removes the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-notebooks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Upload Notebooks to Production
        run: |
          export DATABRICKS_HOST=${{ secrets.PROD_DBX_HOST }}
          export DATABRICKS_TOKEN=${{ secrets.PROD_DBX_TOKEN }}
          
          # Now including the deployment folder as you requested.
          # 2. Specifically upload ONLY the folders you want
          # This avoids .git, .github, and .databricksignore entirely
          databricks workspace import-dir ./fsd-integration/notebook ${{ vars.PROD_WORKSPACE_PATH }}/fsd-integration/notebooks --overwrite
          # databricks workspace import-dir ./deployment ${{ vars.PROD_WORKSPACE_PATH }}/fsd-integration/deployment --overwrite

          # 3. Convert your YAML to JSON on the fly and deploy it
          # This grabs everything under 'CI_CD_Pipeline' and sends it to the API
          yq eval '.resources.jobs.CI_CD_Pipeline' deployment/workflow_prod.yml -o=json > job.json
          
          # databricks jobs create --json @job.json
          
          # 4. Find the existing Job ID
          JOB_ID=$(databricks jobs list --output json | jq -r '.jobs[] | select(.settings.name == "CI_CD_Pipeline") | .job_id' | head -n 1)
          
          if [ ! -z "$JOB_ID" ]; then
            echo "Updating existing Job ID: $JOB_ID"
            # 'reset' updates the job but KEEPS the history
            databricks jobs reset --job-id $JOB_ID --json @job.json
          else
            echo "Job not found. Creating new job..."
            databricks jobs create --json @job.json
          fi















          
          # databricks workspace import-dir . ${{ vars.PROD_WORKSPACE_PATH }} --overwrite
          
          #   # --exclude ".github/*" \
          #   # --exclude ".git/*" \
          #   # --exclude "*.md"
          
          # # # This command maps your Git Root directly to the Production Shared folder
          # # databricks workspace import-dir . ${{ vars.PROD_WORKSPACE_PATH }} \
          # #   --overwrite \
          # #   --exclude ".github/*" \
          # #   --exclude ".git/*" \
          # #   # --exclude "deployment/*" \
          # #   # --exclude "*.yml" \
          # #   --exclude "*.md"


