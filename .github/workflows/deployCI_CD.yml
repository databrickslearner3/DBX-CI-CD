name: Production Notebook Deployment

on:
  push:
    branches:
      - main  # Only runs when code is merged into main

jobs:
  deploy-notebooks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Upload Notebooks to Production
        run: |
          # Use the Secrets and Variables we set up
          export DATABRICKS_HOST=${{ secrets.PROD_DB_HOST }}
          export DATABRICKS_TOKEN=${{ secrets.PROD_DB_TOKEN }}
          
          # This command maps your Git Root directly to the Production Shared folder
          databricks workspace import-dir . ${{ vars.PROD_WORKSPACE_PATH }} \
            --overwrite \
            --exclude ".github/*" \
            --exclude ".git/*" \
            # --exclude "deployment/*" \
            # --exclude "*.yml" \
            --exclude "*.md"


