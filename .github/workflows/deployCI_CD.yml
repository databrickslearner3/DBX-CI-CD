name: Production Notebook Deployment

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-notebooks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Databricks CLI and yq
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

      - name: Upload Notebooks and Update Job
        run: |
          export DATABRICKS_HOST=${{ secrets.PROD_DBX_HOST }}
          export DATABRICKS_TOKEN=${{ secrets.PROD_DBX_TOKEN }}
          
          # 1. Upload Notebooks
          databricks workspace import-dir ./fsd-integration/notebook ${{ vars.PROD_WORKSPACE_PATH }}/fsd-integration/notebooks --overwrite
          
          # 2. Create the RAW JSON from YAML
          yq eval '.resources.jobs.CI_CD_Pipeline' deployment/workflow_prod.yml -o=json > raw_job.json
          
          # 3. Find the existing Job ID
          JOB_ID=$(databricks jobs list --output json | jq -r '.[] | select(.settings.name == "CI_CD_Pipeline") | .job_id' | head -n 1)
          
          echo "Debug: Found Job ID: '$JOB_ID'"

          # 4. Logic: Update if ID exists, otherwise Create
          if [ ! -z "$JOB_ID" ] && [ "$JOB_ID" != "null" ]; then
            echo "Updating existing Job: CI_CD_Pipeline (ID: $JOB_ID)"
            
            # THE FIX: Wrap the fields in 'new_settings' and keep 'job_id' at the top level
            jq -n --arg id "$JOB_ID" --slurpfile job raw_job.json \
            '{"job_id": ($id | tonumber), "new_settings": $job[0]}' > final_update.json
            
            databricks jobs update --json @final_update.json
          else
            echo "Job 'CI_CD_Pipeline' not found. Creating fresh..."
            databricks jobs create --json @raw_job.json
          fi
          
